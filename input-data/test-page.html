<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Privacy Analysis — Test Field</title>
<style>
  body  { font-family: system-ui, sans-serif; max-width: 720px; margin: 60px auto; padding: 0 16px; color: #222; }
  h1    { font-size: 18px; color: #555; }
  p     { font-size: 13px; color: #777; line-height: 1.5; }
  textarea {
    width: 100%;
    min-height: 320px;
    padding: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
    resize: vertical;
  }
</style>
</head>
<body>
  <h1>Test field — paste the test document below.</h1>
  <p>
    This page is used by the privacy-analysis capture protocol.
    No analytics, no third-party scripts. The textarea is what the writing-assistant
    extension activates on. Click into it to focus, then paste.
  </p>
  <textarea id="t" autofocus spellcheck="true" placeholder="Test document goes here…"></textarea>
</body>
</html>
